<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORSITY MUSIC</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Шапка с загрузкой -->
        <div class="header">
            <h1>ALVAREZ</h1>
            <div class="header-actions">
                <button id="uploadBtn" class="upload-btn-header" title="Загрузить трек" aria-label="Добавить трек">
                    <span class="upload-note-icon"></span>
                    <span class="upload-plus-icon"></span>
                </button>

            </div>
        </div>

        <!-- Модальное окно загрузки трека -->
        <div id="uploadModal" class="modal hidden">
            <div class="modal-content upload-modal">
                <div class="modal-header">
                    <h3>Загрузить треки</h3>
                    <button id="closeUploadModalBtn" class="close-btn">✕</button>
                </div>
                
                <div class="file-select-area">
                    <input type="file" id="fileInput" accept=".mp3,audio/mpeg,audio/mp3" multiple>
                    <label for="fileInput" class="file-select-label">📁 Выберите файлы</label>
                    <p class="hint">Поддерживаются MP3 файлы</p>
                </div>

                <div id="pendingTracksList" class="pending-tracks-list"></div>

                <div class="upload-confirm">
                    <button id="confirmUploadBtn" class="confirm-upload-btn" disabled>✅ Загрузить все</button>
                </div>
            </div>
        </div>

        <!-- Модальное окно создания/редактирования плейлиста -->
        <div id="playlistModal" class="modal hidden">
            <div class="modal-content playlist-modal">
                <div class="modal-header">
                    <h3 id="playlistModalTitle">Создать плейлист</h3>
                    <button id="closePlaylistModalBtn" class="close-btn">✕</button>
                </div>
                
                <div class="playlist-form">
                    <div class="playlist-cover-container">
                        <canvas id="playlistCoverEdit" class="playlist-cover-edit" width="150" height="150"></canvas>
                        <button id="changePlaylistCoverBtn" class="small-btn">📷 Изменить обложку</button>
                    </div>
                    
                    <input type="text" id="playlistNameInput" placeholder="Название плейлиста">
                    <input type="text" id="playlistDescInput" placeholder="Описание">
                    
                    <div class="playlist-search">
                        <input type="text" id="playlistSearchInput" placeholder="🔍 Поиск треков...">
                    </div>
                    
                    <div class="available-tracks-list" id="availableTracksList"></div>
                    
                    <h4>Треки в плейлисте:</h4>
                    <div class="playlist-tracks-list" id="playlistTracksList"></div>
                    
                    <div class="playlist-actions">
                        <button id="savePlaylistBtn" class="save-playlist-btn">💾 Сохранить плейлист</button>
                        <button id="deletePlaylistBtn" class="delete-playlist-btn hidden">🗑️ Удалить плейлист</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Меню троеточия для трека -->
        <div id="trackMenu" class="modal hidden">
            <div class="modal-content track-menu-content">
                <div class="modal-header">
                    <span>Действия с треком</span>
                    <button id="closeTrackMenuBtn" class="close-btn">✕</button>
                </div>
                
                <div class="track-menu-actions">
                    <button id="showAddToPlaylistBtn" class="track-action-btn">📋 Добавить в плейлист</button>
                    <button id="deleteTrackLocalBtn" class="track-action-btn delete">🗑️ Удалить из треклиста</button>
                    <button id="deleteTrackCloudBtn" class="track-action-btn delete">☁️🗑️ Удалить из облака и треклиста</button>
                </div>
            </div>
        </div>

        <!-- Меню выбора плейлиста -->
        <div id="playlistChoiceMenu" class="modal hidden">
            <div class="modal-content playlist-choice-content">
                <div class="modal-header">
                    <span>Выберите плейлист</span>
                    <button id="closePlaylistChoiceBtn" class="close-btn">✕</button>
                </div>
                
                <div class="playlist-choice-list" id="playlistChoiceList"></div>
            </div>
        </div>

        <!-- Модальное окно эквалайзера -->
        <div id="eqModal" class="modal hidden">
            <div class="modal-content eq-modal">
                <div class="modal-header">
                    <h3>🎚️ Эквалайзер</h3>
                    <button id="closeEqModalBtn" class="close-btn">✕</button>
                </div>
                
                <div class="eq-q-control">
                    <label>Ширина полос (Q-фактор): <span id="qValue">2.5</span></label>
                    <input type="range" id="qSlider" min="0.5" max="10" value="2.5" step="0.1">
                </div>
                
                <div class="eq-presets">
                    <button id="applyMyPresetBtn" class="preset-btn">🎧 Мой пресет</button>
                    <button id="resetEqBtn" class="reset-btn">Сбросить</button>
                </div>
                
                <div class="eq-sliders">
                    <div class="eq-slider">
                        <label>16 Гц</label>
                        <input type="range" id="eq16" min="-12" max="12" value="0" step="0.5">
                        <span id="eq16Val" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>32 Гц</label>
                        <input type="range" id="eq32" min="-12" max="12" value="0" step="0.5">
                        <span id="eq32Val" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>64 Гц</label>
                        <input type="range" id="eq64" min="-12" max="12" value="0" step="0.5">
                        <span id="eq64Val" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>125 Гц</label>
                        <input type="range" id="eq125" min="-12" max="12" value="0" step="0.5">
                        <span id="eq125Val" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>250 Гц</label>
                        <input type="range" id="eq250" min="-12" max="12" value="0" step="0.5">
                        <span id="eq250Val" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>500 Гц</label>
                        <input type="range" id="eq500" min="-12" max="12" value="0" step="0.5">
                        <span id="eq500Val" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>1 кГц</label>
                        <input type="range" id="eq1k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq1kVal" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>2 кГц</label>
                        <input type="range" id="eq2k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq2kVal" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>4 кГц</label>
                        <input type="range" id="eq4k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq4kVal" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>8 кГц</label>
                        <input type="range" id="eq8k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq8kVal" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>16 кГц</label>
                        <input type="range" id="eq16k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq16kVal" class="eq-value">0 dB</span>
                    </div>
                    <div class="eq-slider">
                        <label>22 кГц</label>
                        <input type="range" id="eq22k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq22kVal" class="eq-value">0 dB</span>
                    </div>
                </div>
                
                <div class="eq-control-buttons">
                    <button id="saveEqBtn">Сохранить настройки</button>
                </div>
            </div>
        </div>

        <!-- Верхняя длинная панель плеера (как в VK-подобной компоновке) -->
        <div class="player-main-block vk-top-player">
            <div class="left-controls">
                <button id="prevBtn" class="icon-btn nav-btn-circle" title="Предыдущий трек" aria-label="Назад"></button>
                <button id="playPauseBtn" class="icon-btn play-btn-circle" title="Пуск / Пауза" aria-label="Пуск или пауза"></button>
                <button id="nextBtn" class="icon-btn nav-btn-circle" title="Следующий трек" aria-label="Вперёд"></button>
                <button id="shuffleBtn" class="icon-btn control-btn-circle" title="Случайный порядок" aria-label="Случайный порядок"></button>
                <button id="repeatBtn" class="icon-btn control-btn-circle" title="Режим повтора" aria-label="Режим повтора"></button>
            </div>

            <div class="album-art-container compact-art">
                <canvas id="albumArt" class="album-art" width="64" height="64"></canvas>
            </div>


            <div class="center-progress-zone">
                <div class="current-track-info">
                    <div id="currentTrackTitle" class="current-track-title">Нет трека</div>
                    <div id="currentTrackArtist" class="current-track-artist"></div>
                </div>
                <input type="range" id="progressBar" class="progress-bar" value="0" max="100">
                <span id="timeDisplay" class="time-display">0:00 / 0:00</span>
            </div>

            <div class="right-controls">
                <div class="volume-control compact-volume">
                    <span id="volumeIcon" class="volume-icon"></span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="60">
                    <span id="volumePercent">60%</span>
                </div>
                <button id="moreActionsBtn" class="icon-btn eq-button more-btn" title="Действия с текущим треком" aria-label="Действия"></button>
                <button id="toggleEqBtn" class="icon-btn eq-button" title="Эквалайзер" aria-label="Эквалайзер"></button>
            </div>
        </div>

        <section class="recent-section">
            <h2>Недавно прослушанные</h2>
            <ul id="recentTracksList" class="recent-tracks-list"></ul>
        </section>

        <section class="playlists-section">
            <h2>Плейлисты</h2>
            <div id="playlistsGrid" class="playlists-grid horizontal-playlists"></div>
        </section>

        <section class="tracklist center-tracklist">
            <div class="tracklist-header">
                <h2>Треки</h2>
                <select id="trackSortSelect" class="track-sort-select" aria-label="Сортировка треков">
                    <option value="date_desc">По дате добавления (новые)</option>
                    <option value="alpha">По алфавиту</option>
                    <option value="artist">По исполнителю</option>
                    <option value="year_desc">По году</option>
                    <option value="title">По названию</option>
                </select>
            </div>
            <ul id="tracklist" class="tracklist-ul"></ul>
        </section>

        <input type="file" id="coverFileInput" accept="image/*" style="display: none;">
    </div>
    
    <script src="script.js"></script>
</body>
</html>
