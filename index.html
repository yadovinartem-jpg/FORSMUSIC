<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORSITY MUSIC</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <h1>FOR<span class="sity">SITY</span> MUSIC</h1>
        
        <div class="player-controls">
            <!-- Кнопки управления треками -->
            <div class="track-nav">
                <button id="prevBtn" class="nav-btn" title="Предыдущий трек">⏮️</button>
                <button id="playPauseBtn" class="play-btn">▶️</button>
                <button id="nextBtn" class="nav-btn" title="Следующий трек">⏭️</button>
            </div>
            
            <!-- Дополнительные кнопки управления -->
            <div class="extra-controls">
                <button id="repeatBtn" class="control-btn" title="Режим повтора">🔁</button>
                <button id="shuffleBtn" class="control-btn" title="Перемешать">🔀</button>
            </div>
            
            <input type="range" id="progressBar" value="0" max="100">
            <span id="timeDisplay">0:00 / 0:00</span>
            
            <!-- Регулятор громкости -->
            <div class="volume-control">
                <span id="volumeIcon">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
                <span id="volumePercent">70%</span>
            </div>
        </div>

        <!-- Эквалайзер -->
        <div class="equalizer-section">
            <h2>🎚️ Эквалайзер</h2>
            <button id="toggleEqBtn" class="toggle-eq-btn">Показать эквалайзер</button>
            
            <div id="eqControls" class="eq-controls hidden">
                <!-- Управление шириной полос (Q-фактор) -->
                <div class="eq-q-control">
                    <label>Ширина полос (Q-фактор):</label>
                    <div class="q-input-group">
                        <input type="range" id="qSlider" min="0.5" max="10" value="1.0" step="0.1">
                        <input type="number" id="qValue" min="0.5" max="10" value="1.0" step="0.1">
                        <select id="qPreset">
                            <option value="0.7">🎸 Рок (0.7)</option>
                            <option value="1.0" selected>🎤 Стандарт (1.0)</option>
                            <option value="1.4">🎻 Классика (1.4)</option>
                            <option value="2.0">🔊 Узкие (2.0)</option>
                            <option value="0.5">🌊 Широкие (0.5)</option>
                        </select>
                    </div>
                </div>
                
                <div class="eq-presets">
                    <button id="applyMyPresetBtn" class="preset-btn">🎧 Мой пресет</button>
                    <button id="resetEqBtn" class="reset-btn">Сбросить</button>
                </div>
                
                <div class="eq-sliders">
                    <!-- 32 Гц -->
                    <div class="eq-slider">
                        <label>32 Гц</label>
                        <input type="range" id="eq32" min="-12" max="12" value="0" step="0.5">
                        <span id="eq32Val" class="eq-value">0 dB</span>
                    </div>
                    
                    <!-- 64 Гц -->
                    <div class="eq-slider">
                        <label>64 Гц</label>
                        <input type="range" id="eq64" min="-12" max="12" value="0" step="0.5">
                        <span id="eq64Val" class="eq-value">0 dB</span>
                    </div>
                    
                    <!-- 125 Гц -->
                    <div class="eq-slider">
                        <label>125 Гц</label>
                        <input type="range" id="eq125" min="-12" max="12" value="0" step="0.5">
                        <span id="eq125Val" class="eq-value">0 dB</span>
                    </div>
                    
                    <!-- 250 Гц -->
                    <div class="eq-slider">
                        <label>250 Гц</label>
                        <input type="range" id="eq250" min="-12" max="12" value="0" step="0.5">
                        <span id="eq250Val" class="eq-value">0 dB</span>
                    </div>
                    
                    <!-- 500 Гц -->
                    <div class="eq-slider">
                        <label>500 Гц</label>
                        <input type="range" id="eq500" min="-12" max="12" value="0" step="0.5">
                        <span id="eq500Val" class="eq-value">0 dB</span>
                    </div>
                    
                    <!-- 1 кГц -->
                    <div class="eq-slider">
                        <label>1 кГц</label>
                        <input type="range" id="eq1k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq1kVal" class="eq-value">0 dB</span>
                    </div>
                    
                    <!-- 2 кГц -->
                    <div class="eq-slider">
                        <label>2 кГц</label>
                        <input type="range" id="eq2k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq2kVal" class="eq-value">0 dB</span>
                    </div>
                    
                    <!-- 4 кГц -->
                    <div class="eq-slider">
                        <label>4 кГц</label>
                        <input type="range" id="eq4k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq4kVal" class="eq-value">0 dB</span>
                    </div>
                    
                    <!-- 8 кГц -->
                    <div class="eq-slider">
                        <label>8 кГц</label>
                        <input type="range" id="eq8k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq8kVal" class="eq-value">0 dB</span>
                    </div>
                    
                    <!-- 16 кГц -->
                    <div class="eq-slider">
                        <label>16 кГц</label>
                        <input type="range" id="eq16k" min="-12" max="12" value="0" step="0.5">
                        <span id="eq16kVal" class="eq-value">0 dB</span>
                    </div>
                </div>
                
                <div class="eq-control-buttons">
                    <button id="saveEqBtn">Сохранить настройки</button>
                </div>
            </div>
        </div>
        
        <div class="playlist">
            <h2>Плейлист</h2>
            <button id="clearPlaylistBtn" class="clear-btn">🗑️ Очистить плейлист</button>
            <ul id="playlist">
                <!-- Треки будут добавляться сюда -->
            </ul>
        </div>

        <div class="upload-section">
            <h2>📁 Загрузить с компьютера</h2>
            <div class="upload-area">
                <input type="file" id="fileInput" accept=".mp3,audio/mpeg,audio/mp3">
                <button id="uploadBtn" class="upload-btn">Загрузить трек</button>
            </div>
            <p class="hint">Поддерживаются файлы MP3</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
