<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORSITY MUSIC</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <h1>FOR<span class="sity">SITY</span> MUSIC</h1>
        
        <!-- Обложка текущего трека -->
        <div class="album-art-container">
            <img id="albumArt" class="album-art" src="https://via.placeholder.com/300x300/32007d/ffffff?text=FOR+SITY" alt="Album Art">
            <div class="track-info-header">
                <span id="currentTrackTitle">Нет трека</span>
                <span id="currentTrackArtist"></span>
            </div>
        </div>
        
        <div class="player-controls">
            <!-- Кнопки управления треками -->
            <div class="track-nav">
                <button id="prevBtn" class="nav-btn" title="Предыдущий трек">⏮️</button>
                <button id="playPauseBtn" class="play-btn">▶️</button>
                <button id="nextBtn" class="nav-btn" title="Следующий трек">⏭️</button>
            </div>
            
            <!-- Дополнительные кнопки управления -->
            <div class="extra-controls">
                <button id="repeatBtn" class="control-btn" title="Режим повтора">🔁</button>
                <button id="shuffleBtn" class="control-btn" title="Перемешать">🔀</button>
                <button id="likeBtn" class="control-btn" title="Добавить в избранное">🤍</button>
            </div>
            
            <input type="range" id="progressBar" value="0" max="100">
            <span id="timeDisplay">0:00 / 0:00</span>
            
            <!-- Регулятор громкости -->
            <div class="volume-control">
                <span id="volumeIcon">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
                <span id="volumePercent">70%</span>
            </div>
        </div>

        <!-- Навигация по библиотеке -->
        <div class="library-nav">
            <button id="showPlaylistsBtn" class="library-btn">📋 Плейлисты</button>
            <button id="showFavoritesBtn" class="library-btn">❤️ Избранное</button>
            <button id="showAllTracksBtn" class="library-btn active">🎵 Все треки</button>
        </div>

        <!-- Секция плейлистов (скрыта по умолчанию) -->
        <div id="playlistsSection" class="playlists-section hidden">
            <h2>Мои плейлисты</h2>
            <button id="createPlaylistBtn" class="create-playlist-btn">➕ Создать плейлист</button>
            <div id="playlistsContainer" class="playlists-container">
                <!-- Плейлисты будут добавляться сюда -->
            </div>
        </div>

        <!-- Секция избранного (скрыта по умолчанию) -->
        <div id="favoritesSection" class="favorites-section hidden">
            <h2>Избранное</h2>
            <ul id="favoritesList" class="favorites-list">
                <!-- Избранные треки будут здесь -->
            </ul>
        </div>

        <!-- Основной плейлист (все треки) -->
        <div id="allTracksSection" class="playlist">
            <h2>Плейлист</h2>
            <button id="clearPlaylistBtn" class="clear-btn">🗑️ Очистить плейлист</button>
            <ul id="playlist">
                <!-- Треки будут добавляться сюда -->
            </ul>
        </div>

        <!-- Модальное окно создания плейлиста -->
        <div id="playlistModal" class="modal hidden">
            <div class="modal-content">
                <h3>Создать плейлист</h3>
                <input type="text" id="playlistName" placeholder="Название плейлиста">
                <input type="text" id="playlistAuthor" placeholder="Ваше имя">
                <div class="modal-buttons">
                    <button id="savePlaylistBtn">Создать</button>
                    <button id="cancelPlaylistBtn">Отмена</button>
                </div>
            </div>
        </div>

        <div class="upload-section">
            <h2>📁 Загрузить с компьютера</h2>
            <div class="upload-area">
                <input type="file" id="fileInput" accept=".mp3,audio/mpeg,audio/mp3">
                <button id="uploadBtn" class="upload-btn">Загрузить трек</button>
            </div>
            <p class="hint">Поддерживаются файлы MP3</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
