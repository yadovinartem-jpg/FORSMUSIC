<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatGram Music Player</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <h1>🎵 Мой Музыкальный Плеер</h1>
        
        <div class="player-controls">
            <button id="playPauseBtn">▶️ Play</button>
            <input type="range" id="progressBar" value="0" max="100">
            <span id="timeDisplay">0:00 / 0:00</span>
        </div>
        
        <div class="playlist">
            <h2>Плейлист</h2>
            <ul id="playlist">
                <!-- Треки будут добавляться сюда -->
            </ul>
        </div>
        
        <div class="add-track">
            <h3>Добавить трек</h3>
            <input type="text" id="trackUrl" placeholder="Ссылка на MP3">
            <input type="text" id="trackTitle" placeholder="Название">
            <input type="text" id="trackArtist" placeholder="Исполнитель">
            <button id="addTrackBtn">Добавить</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
